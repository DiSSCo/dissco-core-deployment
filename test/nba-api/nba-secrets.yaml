apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: nba-secrets
  namespace: nba
spec:
  provider: aws
  secretObjects:
    - secretName: nba-secrets
      type: Opaque
      data:
        - objectName: elastic-username
          key: elastic-username
        - objectName: elastic-password
          key: elastic-password
  parameters:
    objects: |
      - objectName: "arn:aws:secretsmanager:eu-west-2:824841205322:secret:nba-test-secrets-K6O2y2"
        jmesPath:
            - path: "elastic_username"
              objectAlias: "elastic-username"
            - path: "elastic_password"
              objectAlias: "elastic-password"