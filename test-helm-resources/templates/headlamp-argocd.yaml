apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp-argocd
  namespace: argocd
spec:
  project: default
  source:
    chart:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    targetRevision: 0.41.0
    helm:
      releaseName: headlamp
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system